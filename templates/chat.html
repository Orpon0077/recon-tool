<!DOCTYPE html>
<html>
<head>
    <title>Recon AI Chat</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="stylesheet" href="/static/css/style.css?v=3">
    <style>
        .chat-layout {
            display: flex;
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            height: calc(100vh - 80px);
        }
        
        .chat-history {
            width: 280px;
            min-width: 200px;
            background: #0d1210;
            border: 1px solid #1a2e20;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .chat-history .panel-header {
            padding: 12px 16px;
            background: #111714;
            border-bottom: 1px solid #1a2e20;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        
        .chat-history .panel-title {
            color: #00ff88;
            font-family: 'Orbitron', monospace;
            font-size: 0.65rem;
            letter-spacing: 0.1em;
        }
        
        .chat-history .panel-tag {
            color: #6a8070;
            font-size: 0.55rem;
            font-family: 'Share Tech Mono', monospace;
        }
        
        .chat-history .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        
        .chat-history .history-list::-webkit-scrollbar {
            width: 3px;
        }
        
        .chat-history .history-list::-webkit-scrollbar-thumb {
            background: #2a4a3a;
            border-radius: 2px;
        }
        
        .chat-history .history-item {
            padding: 10px 12px;
            border-bottom: 1px solid #1a2e20;
            cursor: pointer;
            border-left: 2px solid transparent;
            transition: all 0.2s;
            border-radius: 4px;
            margin-bottom: 4px;
        }
        
        .chat-history .history-item:hover {
            background: #111714;
            border-left-color: #00ff88;
        }
        
        .chat-history .history-item.active {
            background: #1a2e20;
            border-left-color: #00ff88;
        }
        
        .chat-history .history-item .history-preview {
            font-size: 0.7rem;
            color: #b8cfbe;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .chat-history .history-item .history-time {
            font-size: 0.55rem;
            color: #6a8070;
            margin-top: 4px;
        }
        
        .chat-history .history-empty {
            color: #6a8070;
            font-size: 0.7rem;
            padding: 20px;
            text-align: center;
            font-style: italic;
        }
        
        .chat-history .new-chat-btn {
            padding: 8px 16px;
            background: #003d20;
            border: 1px solid #00ff88;
            color: #00ff88;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.65rem;
            transition: all 0.2s;
            margin: 8px;
            flex-shrink: 0;
        }
        
        .chat-history .new-chat-btn:hover {
            background: #00ff88;
            color: #050807;
        }
        
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0d1210;
            border: 1px solid #1a2e20;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .chat-main .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #050807;
        }
        
        .chat-main .chat-messages::-webkit-scrollbar {
            width: 4px;
        }
        
        .chat-main .chat-messages::-webkit-scrollbar-thumb {
            background: #2a4a3a;
            border-radius: 2px;
        }
        
        .chat-main .message {
            padding: 12px 18px;
            margin-bottom: 12px;
            border-radius: 8px;
            white-space: pre-wrap;
            max-width: 85%;
            word-wrap: break-word;
            line-height: 1.6;
            position: relative;
        }
        
        .chat-main .message.user {
            background: #1a2e20;
            color: #b8cfbe;
            margin-left: auto;
            border-right: 2px solid #00ff88;
        }
        
        .chat-main .message.assistant {
            background: #0d1a15;
            color: #00ff88;
            margin-right: auto;
            border-left: 2px solid #00ff88;
        }
        
        .chat-main .message.system {
            background: #2a1a1a;
            color: #ff6b6b;
            margin: 10px auto;
            text-align: center;
            max-width: 90%;
            border-left: 2px solid #ff6b6b;
            border-right: 2px solid #ff6b6b;
        }
        
        .chat-main .message .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        
        .chat-main .message .btn-group a {
            display: inline-block;
            padding: 8px 16px;
            background: #003d20;
            border: 1px solid #00ff88;
            color: #00ff88;
            border-radius: 4px;
            text-decoration: none;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.7rem;
            transition: all 0.2s;
        }
        
        .chat-main .message .btn-group a:hover {
            background: #00ff88;
            color: #050807;
        }
        
        .chat-main .message .btn-group .pdf-btn {
            background: #1a1a2e;
            border-color: #ff8800;
            color: #ff8800;
        }
        
        .chat-main .message .btn-group .pdf-btn:hover {
            background: #ff8800;
            color: #050807;
        }
        
        .chat-main .chat-input {
            display: flex;
            gap: 10px;
            padding: 16px;
            background: #0d1210;
            border-top: 1px solid #1a2e20;
            flex-shrink: 0;
        }
        
        .chat-main .chat-input input {
            flex: 1;
            padding: 12px 16px;
            background: #050807;
            border: 1px solid #1a2e20;
            color: #b8cfbe;
            border-radius: 4px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.85rem;
        }
        
        .chat-main .chat-input input:focus {
            border-color: #00ff88;
            outline: none;
        }
        
        .chat-main .chat-input input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .chat-main .chat-input button {
            padding: 12px 28px;
            background: #003d20;
            border: 1px solid #00ff88;
            color: #00ff88;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.85rem;
            transition: all 0.2s;
            white-space: nowrap;
        }
        
        .chat-main .chat-input button:hover:not(:disabled) {
            background: #00ff88;
            color: #050807;
        }
        
        .chat-main .chat-input button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        
        .chat-main .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 8px 0;
        }
        
        .chat-main .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            animation: typing 1.4s infinite both;
        }
        
        .chat-main .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .chat-main .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }
        
        .chat-main .message-meta {
            font-size: 0.55rem;
            color: #6a8070;
            margin-top: 6px;
        }
        
        .view-dashboard-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 16px;
            background: #003d20;
            border: 1px solid #00ff88;
            color: #00ff88;
            border-radius: 4px;
            text-decoration: none;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.7rem;
            transition: all 0.2s;
        }
        
        .view-dashboard-btn:hover {
            background: #00ff88;
            color: #050807;
        }
        
        .status-online {
            color: #00ff88;
        }
        
        .status-offline {
            color: #ff4444;
        }

        /* ── Reasoning Box Styles ── */
        .reasoning-box {
            background: #0d1a15;
            border: 1px solid #2a4a3a;
            border-radius: 6px;
            margin: 6px 0 12px 0;
            overflow: hidden;
        }
        
        .reasoning-box .reasoning-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px;
            background: #0d1210;
            cursor: pointer;
            user-select: none;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.6rem;
            color: #6a8070;
            border-bottom: 1px solid #1a2e20;
            transition: all 0.2s;
        }
        
        .reasoning-box .reasoning-header:hover {
            background: #111714;
            color: #b8cfbe;
        }
        
        .reasoning-box .reasoning-header .toggle-icon {
            transition: transform 0.3s ease;
            font-size: 0.6rem;
        }
        
        .reasoning-box .reasoning-header .toggle-icon.collapsed {
            transform: rotate(-90deg);
        }
        
        .reasoning-box .reasoning-content {
            padding: 10px 14px;
            color: #6a8070;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.65rem;
            line-height: 1.8;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            background: #0a0f0d;
        }
        
        .reasoning-box .reasoning-content::-webkit-scrollbar {
            width: 3px;
        }
        
        .reasoning-box .reasoning-content::-webkit-scrollbar-thumb {
            background: #2a4a3a;
            border-radius: 2px;
        }
        
        .reasoning-box .reasoning-content.hidden {
            display: none;
        }
        
        .reasoning-box .reasoning-badge {
            color: #6a8070;
            font-size: 0.5rem;
            background: #1a2e20;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 8px;
        }
        
        .reasoning-box .thinking-indicator {
            display: inline-block;
            width: 6px;
            height: 6px;
            background: #00ff88;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        /* ── Assistant message structure ── */
        .assistant-message-wrapper {
            display: flex;
            flex-direction: column;
            width: 100%;
            margin-bottom: 12px;
        }
        .assistant-message-wrapper .response-text {
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.6;
        }
        .assistant-message-wrapper .message.assistant {
            margin-right: auto;
            border-left: 2px solid #00ff88;
            padding: 12px 18px;
            background: #0d1a15;
            border-radius: 8px;
            color: #00ff88;
            max-width: 85%;
        }
        
        @media (max-width: 768px) {
            .chat-layout {
                flex-direction: column;
                padding: 10px;
                height: calc(100vh - 70px);
            }
            .chat-history {
                width: 100%;
                height: 150px;
                min-height: 120px;
            }
            .chat-main {
                height: calc(100vh - 280px);
            }
            .chat-main .message {
                max-width: 95%;
            }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <div class="logo">
                <span class="logo-bracket">[</span>
                <span class="logo-text">RECON</span>
                <span class="logo-bracket">]</span>
                <span class="logo-sub">AI ASSISTANT</span>
            </div>
            <div class="header-status">
                <span class="status-dot" id="statusDot"></span>
                <span style="font-family: 'Share Tech Mono', monospace; font-size: 0.7rem;" id="statusText">ONLINE</span>
            </div>
        </div>
        <div class="header-scan-bar"></div>
    </header>

    <main>
        <div class="chat-layout">
            <div class="chat-history">
                <div class="panel-header">
                    <span class="panel-title">CHAT HISTORY</span>
                    <span class="panel-tag">// saved</span>
                </div>
                <button class="new-chat-btn" onclick="newChat()">+ New Chat</button>
                <div class="history-list" id="historyList">
                    <div class="history-empty">Loading history...</div>
                </div>
            </div>

            <div class="chat-main">
                <div class="chat-messages" id="messages">
                    <div class="message assistant">
Welcome. I am Recon Assistant, your AI-powered web reconnaissance expert.<br><br>
Tell me a domain and what you want to know — I will handle the rest.
                    </div>
                </div>
                <div class="chat-input">
                    <input type="text" id="promptInput" placeholder="Type your command..." autocomplete="off">
                    <button id="sendBtn" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        let currentSessionId = null;
        let isProcessing = false;
        let showReasoning = true;
        const messages = document.getElementById('messages');
        const input = document.getElementById('promptInput');
        const historyList = document.getElementById('historyList');
        const sendBtn = document.getElementById('sendBtn');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function setStatus(online) {
            if (online) {
                statusDot.style.background = '#00ff88';
                statusText.textContent = 'ONLINE';
                statusText.style.color = '#00ff88';
            } else {
                statusDot.style.background = '#ff4444';
                statusText.textContent = 'OFFLINE';
                statusText.style.color = '#ff4444';
            }
        }

        async function checkHealth() {
            try {
                const response = await fetch('/health');
                if (response.ok) {
                    setStatus(true);
                    return true;
                } else {
                    setStatus(false);
                    return false;
                }
            } catch (err) {
                setStatus(false);
                return false;
            }
        }

        async function loadChatHistory() {
            try {
                const response = await fetch('/api/llm/history');
                if (!response.ok) throw new Error('Failed to load history');
                const data = await response.json();
                
                if (data.conversations && data.conversations.length > 0) {
                    historyList.innerHTML = data.conversations.map(conv => `
                        <div class="history-item ${conv.session_id === currentSessionId ? 'active' : ''}" 
                             onclick="loadConversation('${conv.session_id}')">
                            <div class="history-preview">${conv.preview || 'New conversation'}</div>
                            <div class="history-time">${conv.created_at || 'Unknown'} · ${conv.message_count || 0} messages</div>
                        </div>
                    `).join('');
                } else {
                    historyList.innerHTML = `<div class="history-empty">No chat history yet.<br>Start a conversation!</div>`;
                }
                await checkHealth();
            } catch (err) {
                console.error('Failed to load history:', err);
                historyList.innerHTML = `<div class="history-empty">Failed to load history</div>`;
                setStatus(false);
            }
        }

        async function loadConversation(sessionId) {
            try {
                const response = await fetch(`/api/llm/history/${sessionId}`);
                if (!response.ok) throw new Error('Failed to load conversation');
                const data = await response.json();
                
                if (data.messages && data.messages.length > 0) {
                    currentSessionId = sessionId;
                    messages.innerHTML = '';
                    data.messages.forEach(msg => {
                        addMessage(msg.role, msg.content);
                    });
                    
                    document.querySelectorAll('.history-item').forEach(el => el.classList.remove('active'));
                    document.querySelector(`.history-item[onclick="loadConversation('${sessionId}')"]`)?.classList.add('active');
                    
                    messages.scrollTop = messages.scrollHeight;
                }
                await checkHealth();
            } catch (err) {
                console.error('Failed to load conversation:', err);
                setStatus(false);
            }
        }

        function newChat() {
            currentSessionId = null;
            messages.innerHTML = `
                <div class="message assistant">
Welcome. I am Recon Assistant, your AI-powered web reconnaissance expert.<br><br>
Tell me a domain and what you want to know — I will handle the rest.
                </div>
            `;
            document.querySelectorAll('.history-item').forEach(el => el.classList.remove('active'));
            loadChatHistory();
        }

        // ── Helper: Create reasoning box element ──
        function createReasoningBox(reasoningText) {
            const div = document.createElement('div');
            div.className = 'reasoning-box';
            div.innerHTML = `
                <div class="reasoning-header" onclick="toggleReasoning(this)">
                    <span><span class="thinking-indicator"></span>Thinking Process <span class="reasoning-badge">click to expand</span></span>
                    <span class="toggle-icon collapsed">▶</span>
                </div>
                <div class="reasoning-content hidden">${reasoningText.replace(/\n/g, '<br>')}</div>
            `;
            return div;
        }

        // ── Toggle reasoning content ──
        function toggleReasoning(header) {
            const content = header.nextElementSibling;
            const icon = header.querySelector('.toggle-icon');
            if (content.classList.contains('hidden')) {
                content.classList.remove('hidden');
                icon.classList.remove('collapsed');
                icon.textContent = '▼';
            } else {
                content.classList.add('hidden');
                icon.classList.add('collapsed');
                icon.textContent = '▶';
            }
        }

        // ── Add a complete message (for history) ──
        function addMessage(type, text, isTyping = false, reasoning = null) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            
            if (isTyping) {
                div.id = 'typing';
                div.innerHTML = `
                    <div class="typing-indicator">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                `;
            } else {
                let content = '';
                if (reasoning && showReasoning) {
                    content += createReasoningBox(reasoning).outerHTML;
                }
                // Format text with line breaks
                let formattedText = text;
                if (formattedText.includes('\n')) {
                    formattedText = formattedText.replace(/\n/g, '<br>');
                } else {
                    formattedText = formattedText.replace(/(?<!<br>)\s*(-\s|•\s|\*\s|\d+\.\s)/g, '<br>$1');
                    if (formattedText.startsWith('<br>')) {
                        formattedText = formattedText.substring(4);
                    }
                }
                content += `<div class="response-text">${formattedText}</div>`;
                div.innerHTML = content;
            }
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
            return div;
        }

        function removeTyping() {
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
        }

        // ── Main send function (FIXED: wrapper appended immediately) ──
        async function sendMessage() {
            const prompt = input.value.trim();
            if (!prompt || isProcessing) return;

            isProcessing = true;
            input.disabled = true;
            sendBtn.disabled = true;

            addMessage('user', prompt);
            input.value = '';
            
            const typingDiv = addMessage('assistant', '', true);
            let reasoningBox = null;
            let responseDiv = null;
            let responseText = '';
            let reasoningContent = '';

            try {
                const response = await fetch('/api/llm/chat/stream', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        prompt: prompt,
                        session_id: currentSessionId,
                        show_reasoning: true
                    })
                });

                removeTyping();

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || `HTTP ${response.status}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                // Create container for assistant message and append immediately
                const wrapper = document.createElement('div');
                wrapper.className = 'assistant-message-wrapper';
                messages.appendChild(wrapper);

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                
                                if (data.type === 'reasoning') {
                                    reasoningContent = data.content;
                                    if (!reasoningBox) {
                                        reasoningBox = createReasoningBox(reasoningContent);
                                        wrapper.appendChild(reasoningBox);
                                    } else {
                                        // Update reasoning content
                                        const contentDiv = reasoningBox.querySelector('.reasoning-content');
                                        if (contentDiv) {
                                            contentDiv.innerHTML = reasoningContent.replace(/\n/g, '<br>');
                                        }
                                    }
                                    messages.scrollTop = messages.scrollHeight;
                                    
                                } else if (data.type === 'reasoning_done') {
                                    if (reasoningBox) {
                                        const header = reasoningBox.querySelector('.reasoning-header');
                                        const content = reasoningBox.querySelector('.reasoning-content');
                                        const icon = reasoningBox.querySelector('.toggle-icon');
                                        if (header) {
                                            header.innerHTML = `<span><span class="thinking-indicator" style="display:none;"></span>Thinking Process <span class="reasoning-badge">click to expand</span></span><span class="toggle-icon collapsed">▶</span>`;
                                        }
                                        if (content) {
                                            content.classList.add('hidden');
                                        }
                                        if (icon) {
                                            icon.classList.add('collapsed');
                                            icon.textContent = '▶';
                                        }
                                    }
                                    
                                } else if (data.type === 'response') {
                                    responseText += data.content;
                                    if (!responseDiv) {
                                        responseDiv = document.createElement('div');
                                        responseDiv.className = 'message assistant';
                                        responseDiv.style.borderLeft = '2px solid #00ff88';
                                        responseDiv.style.paddingLeft = '12px';
                                        responseDiv.style.marginTop = '4px';
                                        const respWrap = document.createElement('div');
                                        respWrap.className = 'response-text';
                                        responseDiv.appendChild(respWrap);
                                        wrapper.appendChild(responseDiv);
                                    }
                                    const textDiv = responseDiv.querySelector('.response-text');
                                    if (textDiv) {
                                        textDiv.innerHTML = responseText.replace(/\n/g, '<br>');
                                    }
                                    messages.scrollTop = messages.scrollHeight;
                                    
                                } else if (data.type === 'done') {
                                    break;
                                } else if (data.type === 'error') {
                                    const errDiv = document.createElement('div');
                                    errDiv.className = 'message system';
                                    errDiv.textContent = `Error: ${data.content}`;
                                    messages.appendChild(errDiv);
                                }
                            } catch (e) {
                                console.error('Parse error:', e);
                            }
                        }
                    }
                }

                // If no response received, show a fallback
                if (!responseText && !reasoningContent) {
                    const fallback = document.createElement('div');
                    fallback.className = 'message system';
                    fallback.textContent = 'No response received. Please try again.';
                    messages.appendChild(fallback);
                }

                await loadChatHistory();
                setStatus(true);

            } catch (err) {
                removeTyping();
                console.error('Chat error:', err);
                const errDiv = document.createElement('div');
                errDiv.className = 'message system';
                errDiv.textContent = `Error: ${err.message || 'Something went wrong. Please try again.'}`;
                messages.appendChild(errDiv);
                setStatus(false);
            } finally {
                isProcessing = false;
                input.disabled = false;
                sendBtn.disabled = false;
                input.focus();
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await checkHealth();
            await loadChatHistory();
            input.focus();
            
            setInterval(checkHealth, 10000);
        });

        window.checkHealth = checkHealth;
        window.sendMessage = sendMessage;
        window.newChat = newChat;
        window.loadConversation = loadConversation;
        window.toggleReasoning = toggleReasoning;
    </script>
</body>
</html>
