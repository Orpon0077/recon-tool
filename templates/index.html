<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recon Tool</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

  <header>
    <h1>Recon Tool</h1>
    <span id="statusLabel">IDLE</span>
  </header>

  <div class="layout">

    <!-- ── Left Sidebar — Scan History ── -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>Scan History</h2>
        <button onclick="loadHistory()">↺</button>
      </div>
      <div id="historyList">
        <p class="no-data">No scans yet.</p>
      </div>
    </aside>

    <!-- ── Main Content ── -->
    <main>
      <section class="input-section">
        <input type="text" id="urlInput" placeholder="Enter URL e.g. example.com" />
        <button id="scanBtn" onclick="startScan()">Analyze</button>
      </section>

      <section id="logSection" style="display:none">
        <h2>Log</h2>
        <div id="terminalLog"></div>
      </section>

      <div id="resultsGrid" style="display:none">

        <!-- SSL/TLS Analysis -->
        <section class="card" id="sslPanel">
          <h2>SSL/TLS Analysis <span id="sslStatus"></span></h2>
          <div id="sslBody"></div>
        </section>

        <!-- Security Headers Analysis -->
        <section class="card" id="securityPanel">
          <h2>Security Headers <span id="securityStatus"></span></h2>
          <div id="securityBody"></div>
        </section>

        <!-- Screenshot -->
        <section class="card" id="screenshotPanel">
          <h2>Screenshot <span id="screenshotStatus"></span></h2>
          <div id="screenshotBody"></div>
        </section>

        <!-- Port Scanning -->
        <section class="card full-width" id="portsPanel">
          <h2>Port Scanning <span id="portsStatus"></span></h2>
          <div id="portsBody"></div>
        </section>

      </div>
    </main>

  </div>

  <script src="/static/js/dashboard.js"></script>
</body>
</html>
